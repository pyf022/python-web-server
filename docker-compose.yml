services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - tool-data:/data
    depends_on:
      - redis

  worker:
    build: .
    command: ["rq", "worker", "tool-jobs", "--url", "redis://redis:6379/0"]
    env_file:
      - .env.example
    volumes:
      - tool-data:/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  tool-data:
